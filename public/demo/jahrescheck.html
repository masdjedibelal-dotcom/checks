<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="color-scheme" content="light"/>
  <title>Jahrescheck — CheckKit Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root { --accent:#166534; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Geist',system-ui,sans-serif;background:#fafaf8;color:#0d0d0d;min-height:100vh;padding:20px 16px 48px;-webkit-font-smoothing:antialiased;}
    .back{display:inline-flex;font-size:13px;color:rgba(0,0,0,.45);text-decoration:none;margin-bottom:16px;}
    .back:hover{color:#0d0d0d;}
    .wrap{max-width:400px;margin:0 auto;}
    .shell{background:#fff;border-radius:20px;border:1px solid rgba(0,0,0,.08);box-shadow:0 12px 40px rgba(0,0,0,.08);overflow:hidden;}
    .ribbon{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;text-align:center;padding:9px;background:color-mix(in srgb,var(--accent) 12%,transparent);color:var(--accent);}
    .inner{padding:22px;}
    .ey{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:8px;}
    .ttl{font-size:17px;font-weight:800;letter-spacing:-.4px;line-height:1.2;margin-bottom:6px;}
    .sub{font-size:12px;color:rgba(0,0,0,.45);line-height:1.5;margin-bottom:18px;}
    .row{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:10px;background:#f5f4f0;margin-bottom:8px;cursor:pointer;transition:background .15s;}
    .row:hover{background:#edf7ed;}
    .dot{width:20px;height:20px;border-radius:6px;border:2px solid rgba(0,0,0,.15);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;}
    .dot.on{border-color:transparent;background:var(--accent);color:#fff;}
    .dot.on::after{content:'✓';}
    .txt{font-size:12px;font-weight:500;color:rgba(0,0,0,.6);}
    .cta{width:100%;padding:12px;border-radius:10px;border:none;font-size:13px;font-weight:700;background:var(--accent);color:#fff;cursor:pointer;margin-top:16px;}
    .cta:hover{filter:brightness(1.05);}
    .prog{height:3px;background:rgba(0,0,0,.08);border-radius:2px;margin-top:18px;overflow:hidden;}
    .prog>div{height:100%;background:var(--accent);width:33%;transition:width .3s;}
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="/templates">← Zur Template-Galerie</a>
    <div class="shell">
      <div class="ribbon">Interaktive Demo · Jahrescheck</div>
      <div class="inner">
        <div class="ey">Jahrescheck · Schritt 1</div>
        <h1 class="ttl">Was haben Sie bereits?</h1>
        <p class="sub">Tippen Sie an, was für Sie zutrifft — 5 Sparten, über 30 Produkte im Vollprodukt.</p>
        <div id="list"></div>
        <div class="prog"><div id="fill"></div></div>
        <button type="button" class="cta" id="go">Weiter →</button>
      </div>
    </div>
  </div>
  <script>
    var items=['Berufsunfähigkeit (BU)','Privathaftpflicht','Krankentagegeld','Risikolebensversicherung','Krankenzusatzversicherung','Hausrat / Wohngebäude'];
    var list=document.getElementById('list');
    var fill=document.getElementById('fill');
    items.forEach(function(label,i){
      var on=i<2;
      var row=document.createElement('div');
      row.className='row';
      row.innerHTML='<div class="dot'+(on?' on':'')+'"></div><span class="txt"></span>';
      row.querySelector('.txt').textContent=label;
      row.onclick=function(){
        var d=row.querySelector('.dot');
        d.classList.toggle('on');
        var n=list.querySelectorAll('.dot.on').length;
        fill.style.width=(8+n*14)+'%';
      };
      list.appendChild(row);
    });
    document.getElementById('go').onclick=function(){alert('Demo: Im gekauften Template folgen weitere Schritte, Lebensereignisse und das Ergebnis-PDF.');};
    (function(){var n=list.querySelectorAll('.dot.on').length;fill.style.width=(8+n*14)+'%';})();
  </script>
</body>
</html>
