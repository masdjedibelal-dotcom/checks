<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="color-scheme" content="light"/>
  <title>Renten-3-Schichten — CheckKit Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    :root { --accent:#059669; --s1:#0369a1; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Geist',system-ui,sans-serif;background:#fafaf8;color:#0d0d0d;min-height:100vh;padding:20px 16px 48px;-webkit-font-smoothing:antialiased;}
    .back{display:inline-flex;font-size:13px;color:rgba(0,0,0,.45);text-decoration:none;margin-bottom:16px;}
    .back:hover{color:#0d0d0d;}
    .wrap{max-width:400px;margin:0 auto;}
    .shell{background:#fff;border-radius:20px;border:1px solid rgba(0,0,0,.08);box-shadow:0 12px 40px rgba(0,0,0,.08);overflow:hidden;}
    .ribbon{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;text-align:center;padding:9px;background:color-mix(in srgb,var(--accent) 12%,transparent);color:var(--accent);}
    .inner{padding:22px;}
    .ey{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:8px;}
    .ttl{font-size:17px;font-weight:800;letter-spacing:-.4px;margin-bottom:6px;}
    .sub{font-size:12px;color:rgba(0,0,0,.45);line-height:1.5;margin-bottom:18px;}
    .field{margin-bottom:14px;}
    .field label{display:block;font-size:11px;font-weight:600;color:rgba(0,0,0,.45);margin-bottom:6px;}
    .field input{width:100%;padding:10px 12px;border-radius:10px;border:1px solid rgba(0,0,0,.1);font-size:14px;font-family:inherit;}
    .mprog{height:8px;background:rgba(0,0,0,.07);border-radius:4px;overflow:hidden;display:flex;margin:16px 0;}
    .mprog>div{transition:flex .3s;}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
    .cell{border-radius:10px;padding:12px;text-align:center;}
    .cn{font-size:10px;color:rgba(0,0,0,.35);margin-bottom:4px;}
    .cv{font-size:18px;font-weight:800;font-family:'Instrument Serif',serif;}
    .gapnote{font-size:11px;color:#dc2626;font-weight:600;text-align:center;margin-bottom:12px;}
    .cta{width:100%;padding:12px;border-radius:10px;border:none;font-size:13px;font-weight:700;background:var(--accent);color:#fff;cursor:pointer;}
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="/templates">← Zur Template-Galerie</a>
    <div class="shell">
      <div class="ribbon">Interaktive Demo · Renten-3-Schichten</div>
      <div class="inner">
        <div class="ey">Altersvorsorge</div>
        <h1 class="ttl">Ihre Rentenlücke</h1>
        <p class="sub">Gesetzliche Rente, bAV/Riester und Privat — vereinfachte Demo-Rechnung.</p>
        <div class="field">
          <label for="wunsch">Wunschrente (netto / Monat)</label>
          <input type="number" id="wunsch" value="2800" min="0" step="50"/>
        </div>
        <div class="field">
          <label for="s1">Schicht 1 — gesetzlich (geschätzt)</label>
          <input type="number" id="s1" value="1200" min="0" step="50"/>
        </div>
        <div class="field">
          <label for="s23">Schicht 2+3 — bAV & privat (geschätzt)</label>
          <input type="number" id="s23" value="560" min="0" step="50"/>
        </div>
        <div class="mprog" id="bar"></div>
        <div class="grid2">
          <div class="cell" style="background:#dbeafe;"><div class="cn">Summe Vorsorge</div><div class="cv" id="sumv" style="color:var(--s1);">1.760€</div></div>
          <div class="cell" style="background:#fee2e2;"><div class="cn">Lücke / Monat</div><div class="cv" id="luecke" style="color:#dc2626;">1.040€</div></div>
        </div>
        <p class="gapnote" id="hint">Ziel: Lücke mit Strategie (Rente, ETF, Hybrid) schließen.</p>
        <button type="button" class="cta">Strategie wählen</button>
      </div>
    </div>
  </div>
  <script>
    function calc(){
      var w=+document.getElementById('wunsch').value||0;
      var a=+document.getElementById('s1').value||0;
      var b=+document.getElementById('s23').value||0;
      var sum=a+b;
      var gap=Math.max(0,w-sum);
      document.getElementById('sumv').textContent=sum.toLocaleString('de-DE')+'€';
      document.getElementById('luecke').textContent=gap.toLocaleString('de-DE')+'€';
      var p=Math.min(100,Math.round((sum/w)*100)||0);
      var bar=document.getElementById('bar');
      bar.innerHTML='<div style="flex:'+p+';background:linear-gradient(90deg,#0369a1,#7c3aed,#059669)"></div><div style="flex:'+(100-p)+';background:rgba(0,0,0,.06)"></div>';
    }
    ['wunsch','s1','s23'].forEach(function(id){
      document.getElementById(id).addEventListener('input',calc);
    });
    calc();
  </script>
</body>
</html>
