<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="color-scheme" content="light"/>
  <title>GKV vs. PKV — CheckKit Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root { --gkv:#059669; --pkv:#7c3aed; --accent:#dc2626; }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Geist',system-ui,sans-serif;background:#fafaf8;color:#0d0d0d;min-height:100vh;padding:20px 16px 48px;-webkit-font-smoothing:antialiased;}
    .back{display:inline-flex;font-size:13px;color:rgba(0,0,0,.45);text-decoration:none;margin-bottom:16px;}
    .back:hover{color:#0d0d0d;}
    .wrap{max-width:400px;margin:0 auto;}
    .shell{background:#fff;border-radius:20px;border:1px solid rgba(0,0,0,.08);box-shadow:0 12px 40px rgba(0,0,0,.08);overflow:hidden;}
    .ribbon{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;text-align:center;padding:9px;background:rgba(220,38,38,.08);color:var(--accent);}
    .inner{padding:22px;}
    .ey{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:8px;}
    .ttl{font-size:17px;font-weight:800;letter-spacing:-.4px;margin-bottom:6px;}
    .sub{font-size:12px;color:rgba(0,0,0,.45);line-height:1.5;margin-bottom:18px;}
    .sl{margin-bottom:14px;}
    .sl label{display:flex;justify-content:space-between;font-size:11px;font-weight:600;margin-bottom:6px;color:rgba(0,0,0,.45);}
    .sl input{width:100%;}
    .bar{display:flex;height:10px;border-radius:5px;overflow:hidden;margin:16px 0;}
    .bar>div{transition:flex .25s;}
    .pct{display:flex;justify-content:space-between;font-size:11px;font-weight:700;margin-bottom:10px;}
    .rec{padding:10px 12px;border-radius:10px;font-size:12px;font-weight:700;margin-bottom:14px;}
    .cta{width:100%;padding:12px;border-radius:10px;border:none;font-size:13px;font-weight:700;background:var(--accent);color:#fff;cursor:pointer;}
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="/templates">← Zur Template-Galerie</a>
    <div class="shell">
      <div class="ribbon">Interaktive Demo · GKV vs. PKV</div>
      <div class="inner">
        <div class="ey">Gesundheit</div>
        <h1 class="ttl">Ihre Entscheidungshilfe</h1>
        <p class="sub">Gewichtung aus Alter, Kindern und Gesundheit (Demo, keine Beratung).</p>
        <div class="sl">
          <label><span>Alter</span><span id="vAlter">35</span></label>
          <input type="range" id="alter" min="18" max="55" value="35"/>
        </div>
        <div class="sl">
          <label><span>Kinder</span><span id="vKind">1</span></label>
          <input type="range" id="kind" min="0" max="4" value="1"/>
        </div>
        <div class="sl">
          <label><span>Gesundheit (subjektiv 1–10)</span><span id="vGes">7</span></label>
          <input type="range" id="ges" min="1" max="10" value="7"/>
        </div>
        <div class="bar" id="bbar"></div>
        <div class="pct"><span id="pg" style="color:var(--gkv)">GKV 65%</span><span id="pp" style="color:var(--pkv)">PKV 35%</span></div>
        <div class="rec" id="rec"></div>
        <button type="button" class="cta">Gespräch anfragen</button>
      </div>
    </div>
  </div>
  <script>
    function calc(){
      var a=+document.getElementById('alter').value;
      var k=+document.getElementById('kind').value;
      var g=+document.getElementById('ges').value;
      document.getElementById('vAlter').textContent=a;
      document.getElementById('vKind').textContent=k;
      document.getElementById('vGes').textContent=g;
      var gkv=50+k*8+(55-a)*0.6+g*2;
      var pkv=100-gkv+((a-25)*0.4);
      var sum=gkv+pkv;
      gkv=Math.round((gkv/sum)*100);
      pkv=100-gkv;
      document.getElementById('bbar').innerHTML='<div style="flex:'+gkv+';background:var(--gkv)"></div><div style="flex:'+pkv+';background:var(--pkv)"></div>';
      document.getElementById('pg').textContent='GKV '+gkv+'%';
      document.getElementById('pp').textContent='PKV '+pkv+'%';
      var rec=document.getElementById('rec');
      if(gkv>=pkv){
        rec.style.background='#ecfdf5';
        rec.style.color='#065f46';
        rec.textContent='→ Tendenz: GKV (Demo-Score)';
      }else{
        rec.style.background='#f5f3ff';
        rec.style.color='#5b21b6';
        rec.textContent='→ Tendenz: PKV prüfen (Demo-Score)';
      }
    }
    ['alter','kind','ges'].forEach(function(id){
      document.getElementById(id).addEventListener('input',calc);
    });
    calc();
  </script>
</body>
</html>
