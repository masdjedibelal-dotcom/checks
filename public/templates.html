<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CheckKit — Vorlagen-Demos</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: #fafafa; color: #111; }
    header { padding: 16px 20px; border-bottom: 1px solid #eee; background: #fff; }
    h1 { margin: 0; font-size: 18px; }
    .wrap { display: flex; flex-wrap: wrap; gap: 8px; padding: 16px 20px; max-width: 900px; }
    button {
      padding: 10px 14px; border: 1px solid #e0e0e0; border-radius: 8px;
      background: #fff; font-size: 13px; cursor: pointer;
    }
    button:hover { border-color: #111; }
    .frame-wrap { margin: 0 20px 40px; border: 1px solid #e8e8e8; border-radius: 12px; overflow: hidden; background: #fff; min-height: 520px; }
    iframe { display: block; width: 100%; height: 72vh; border: 0; }
    #demoTitle { font-size: 13px; color: #666; padding: 10px 16px; border-bottom: 1px solid #f0f0f0; }
  </style>
</head>
<body>
  <header>
    <h1>Live-Demos (Next.js <code>/demo/[slug]</code>)</h1>
  </header>
  <div class="wrap">
    <button type="button" onclick="openDemo('bedarfscheck', 'Versicherungs-Check')">bedarfscheck</button>
    <button type="button" onclick="openDemo('lebenssituations-check', 'Lebenssituations-Check')">lebenssituations-check</button>
    <button type="button" onclick="openDemo('einkommens-check', 'Einkommens-Check')">einkommens-check</button>
    <button type="button" onclick="openDemo('gkv-pkv', 'GKV vs. PKV')">gkv-pkv</button>
    <button type="button" onclick="openDemo('vorsorge-check', 'Vorsorge-Check')">vorsorge-check</button>
    <button type="button" onclick="openDemo('risikoleben', 'Risikoleben')">risikoleben</button>
    <button type="button" onclick="openDemo('pflege-check', 'Pflege-Check')">pflege-check</button>
    <button type="button" onclick="openDemo('immobilien-check', 'Immobilien-Check')">immobilien-check</button>
  </div>
  <div class="frame-wrap">
    <div id="demoTitle">Demo auswählen</div>
    <iframe id="demoFrame" title="Demo" src="about:blank"></iframe>
  </div>
  <script>
    function g(id) { return document.getElementById(id); }
    function openDemo(slug, title) {
      g('demoTitle').textContent = title + ' (' + slug + ')';
      g('demoFrame').src = '/demo/' + slug;
    }
  </script>
</body>
</html>
